name: Validate ARIA

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Scan tracked files for credential-shaped values
        shell: bash
        run: |
          if git grep -nE '(sk-[A-Za-z0-9_-]{16,}|AKIA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|OPENAI_API_KEY[[:space:]]*=[^[:space:]]+)' -- ':!package-lock.json'; then
            echo 'Credential-shaped value found in tracked source.' >&2
            exit 1
          fi
      - run: npm test
      - run: npm --workspace frontend run build
